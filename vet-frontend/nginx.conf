# __DOMAIN__ подставляется реальным доменом при старте контейнера
# (см. docker-entrypoint.d/40-domain.sh, переменная окружения DOMAIN)

server {
    listen 80;
    server_name __DOMAIN__;

    # ACME-челлендж Let's Encrypt (HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name __DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;

    # Проксирование API-запросов на бэкенд (внутренняя docker-сеть)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA-маршрутизация: любой путь отдаёт index.html, роутинг на клиенте
    location / {
        try_files $uri $uri/ /index.html;
    }
}
