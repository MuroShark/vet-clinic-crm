# Продакшн-стек: nginx (web) — единственный публичный контейнер (80/443),
# backend и SQL Server — только во внутренней docker-сети.
# Секреты берутся из файла .env (см. .env.example). Запуск: см. DEPLOY.md.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vetclinic-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -No -C 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    # Порты наружу не публикуются — доступ только из внутренней сети

  backend:
    build:
      context: ./AhillBackend
      dockerfile: Dockerfile
    container_name: vetclinic-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=vetclinic_db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      Jwt__Key: ${JWT_KEY}
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    # Порты наружу не публикуются — nginx обращается к backend:8080 по внутренней сети

  web:
    build:
      context: ./ahill-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: vetclinic-web
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: vetclinic-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Автопродление сертификата каждые 12 часов
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  sqlserver_data:
