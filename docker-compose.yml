services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vetclinic-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      # Локальный dev-пароль — не использовать в продакшне
      SA_PASSWORD: "Dev_Strong!Pass1"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Dev_Strong!Pass1' -Q 'SELECT 1' -No -C 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./VetClinicBackend
      dockerfile: Dockerfile
    container_name: vetclinic-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=vetclinic_db;User Id=sa;Password=Dev_Strong!Pass1;TrustServerCertificate=True;"
    ports:
      - "8080:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

volumes:
  sqlserver_data:
